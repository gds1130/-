<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI宇宙导航系统</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

#container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#title{

position:absolute;

top:25px;

left:50%;

transform:translateX(-50%);

z-index:100;

font-size:42px;

font-weight:700;

letter-spacing:4px;

color:white;

text-shadow:
0 0 20px #00bfff,
0 0 40px #00bfff;

}

#backBtn{

position:absolute;

top:20px;

left:20px;

z-index:100;

padding:12px 20px;

border-radius:12px;

text-decoration:none;

color:white;

background:rgba(255,255,255,.08);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,.15);

transition:.3s;

}

#backBtn:hover{
background:rgba(255,255,255,.15);
}

#infoPanel{

position:absolute;

right:25px;

top:25px;

width:340px;

z-index:100;

padding:20px;

display:none;

border-radius:20px;

background:rgba(0,0,0,.75);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.12);

color:white;

}

#infoPanel h2{

margin-bottom:15px;

color:#4fc3ff;

}

#infoPanel p{

line-height:1.8;

margin-bottom:15px;

}

#infoPanel a{

display:inline-block;

padding:12px 20px;

border-radius:10px;

background:#0078ff;

color:white;

text-decoration:none;

}

#hint{

position:absolute;

bottom:30px;

left:50%;

transform:translateX(-50%);

z-index:100;

color:rgba(255,255,255,.75);

font-size:14px;

letter-spacing:2px;

}

@media(max-width:768px){

#title{
font-size:24px;
}

#infoPanel{
width:90%;
left:5%;
right:auto;
top:auto;
bottom:20px;
}

}

</style>
</head>
<body>
<div id="title">AI宇宙导航系统</div>
<div id="container"></div>
<div id="infoPanel">
<h2 id="planetName"></h2>
<p id="planetDesc"></p>
<a id="planetLink" target="_blank">访问官网</a>
</div>
<div id="hint">
点击AI星球探索人工智能世界
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
3000
);

camera.position.set(0,8,35);

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

document
.getElementById("container")
.appendChild(renderer.domElement);

/* 星空背景 */

const starGeometry =
new THREE.BufferGeometry();

const starVertices=[];

for(let i=0;i<20000;i++){

starVertices.push(
(Math.random()-0.5)*3000
);

starVertices.push(
(Math.random()-0.5)*3000
);

starVertices.push(
(Math.random()-0.5)*3000
);

}

starGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starVertices,
3
)
);

const starMaterial =
new THREE.PointsMaterial({
color:0xffffff,
size:1.2
});

const stars =
new THREE.Points(
starGeometry,
starMaterial
);

scene.add(stars);

/* 灯光 */

const pointLight =
new THREE.PointLight(
0xffffff,
2
);

pointLight.position.set(
50,
50,
50
);

scene.add(pointLight);

const ambientLight =
new THREE.AmbientLight(
0x666666
);

scene.add(ambientLight);
/* =====================
AI 地球
===================== */

const earthGeometry =
new THREE.SphereGeometry(
5,
64,
64
);

const earthMaterial =
new THREE.MeshStandardMaterial({

color:0x1e88e5,

emissive:0x0a3d91,

emissiveIntensity:0.8,

roughness:0.8,

metalness:0.2

});

const earth =
new THREE.Mesh(
earthGeometry,
earthMaterial
);

scene.add(earth);

/* 发光大气层 */

const glowGeometry =
new THREE.SphereGeometry(
5.4,
64,
64
);

const glowMaterial =
new THREE.MeshBasicMaterial({

color:0x4fc3ff,

transparent:true,

opacity:0.18

});

const glow =
new THREE.Mesh(
glowGeometry,
glowMaterial
);

scene.add(glow);

/* =====================
AI 行星数据
===================== */

const aiData = [

},

{

},

{

{
