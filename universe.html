<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI宇宙导航系统</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:"Microsoft YaHei",sans-serif;
}

#container{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#infoPanel{

position:absolute;

right:20px;
top:20px;

width:320px;

background:rgba(0,0,0,.75);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.15);

border-radius:20px;

padding:20px;

color:white;

z-index:100;

display:none;

}

#infoPanel h2{
margin-bottom:10px;
color:#4fc3ff;
}

#infoPanel p{
line-height:1.7;
font-size:14px;
margin-bottom:10px;
}

#infoPanel a{

display:inline-block;

padding:10px 20px;

background:#1e88e5;

color:white;

text-decoration:none;

border-radius:8px;

}

#title{

position:absolute;

top:30px;

left:50%;

transform:translateX(-50%);

color:white;

font-size:36px;

font-weight:bold;

z-index:100;

letter-spacing:3px;

text-shadow:0 0 20px #4fc3ff;

}

#back{

position:absolute;

left:20px;

top:20px;

z-index:100;

padding:10px 20px;

background:rgba(255,255,255,.1);

color:white;

text-decoration:none;

border-radius:10px;

border:1px solid rgba(255,255,255,.2);

}

@media(max-width:768px){

#infoPanel{

width:90%;

left:5%;

right:auto;

bottom:20px;

top:auto;

}

#title{

font-size:24px;

}

}

</style>
</head>

<body>

<a id="back" href="index.html">← 返回首页</a>

<div id="title">AI宇宙导航系统</div>

<div id="container"></div>

<div id="infoPanel">
<h2 id="aiName"></h2>
<p id="aiDesc"></p>
<a id="aiLink" target="_blank">访问官网</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 25;

const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document
.getElementById("container")
.appendChild(renderer.domElement);

const starsGeometry =
new THREE.BufferGeometry();

const starVertices=[];

for(let i=0;i<10000;i++){

starVertices.push(
(Math.random()-0.5)*2000
);

starVertices.push(
(Math.random()-0.5)*2000
);

starVertices.push(
(Math.random()-0.5)*2000
);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starVertices,
3
)
);

const starsMaterial =
new THREE.PointsMaterial({
color:0xffffff,
size:0.8
});

const stars =
new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(stars);

const light =
new THREE.PointLight(
0xffffff,
2
);

light.position.set(
20,
20,
20
);

scene.add(light);

const ambient =
new THREE.AmbientLight(
0x555555
);

scene.add(ambient);
