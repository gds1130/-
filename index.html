<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
html{
    scroll-behavior:smooth;
}
body{
    background:#050505;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
/* 首屏 */
.hero{
    position:relative;
    height:100vh;
    background-image:url("hero.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
}
.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(
    rgba(0,0,0,.45),
    rgba(0,0,0,.75)
    );
}
.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
}
.small-title{
    letter-spacing:4px;
    color:#d1d5db;
    margin-bottom:20px;
}
.hero h1{
    font-size:72px;
    font-weight:300;
    margin-bottom:15px;
}
.hero p{
    color:#d1d5db;
    font-size:20px;
    margin-bottom:40px;
}
.scroll-btn{
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,255,255,.3);
    padding:12px 24px;
    border-radius:50px;
}
/* 内容 */
.section{
    max-width:1000px;
    margin:auto;
    padding:120px 30px;
}
.section h2{
    font-size:40px;
    margin-bottom:30px;
}
.section p{
    line-height:2;
    color:#d1d5db;
}
.card-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}
.card{
    padding:30px;
    background:
    rgba(255,255,255,.04);
    border:
    1px solid rgba(255,255,255,.08);
    border-radius:20px;
    transition:.3s;
}
.card:hover{
    transform:translateY(-8px);
}
.card h3{
    margin-bottom:15px;
}
.card p{
    color:#9ca3af;
}
@media(max-width:768px){
.hero h1{
    font-size:42px;
}
.section h2{
    font-size:28px;
}
}
</style>
