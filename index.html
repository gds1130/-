<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高东生 | 个人主页</title>
    <style>
        /* 1. 基础重置与高级感字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 视频未加载出来前的纯黑底色 */
        }

        /* 2. 全屏视频背景 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3. 暗色遮罩（让视频变暗，突出文字的高级感层级） */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45); /* 45% 的黑色半透明遮罩 */
            z-index: -1;
        }

        /* 4. 主体内容容器 - 磨砂玻璃质感 */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.06); /* 极其微弱的白底 */
            backdrop-filter: blur(16px); /* 核心：毛玻璃模糊效果 */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* 极其细微的白边 */
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            color: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            
            /* 入场淡入动画 */
            animation: fadeInTransform 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 5. 文本与排版 */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px; /* 字间距拉开，更有呼吸感 */
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* 6. 互动按钮（极简线条风格） */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            padding: 14px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        /* 鼠标悬停/手机点击效果 */
        .btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* 7. 动画定义 */
        @keyframes fadeInTransform {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- 视频背景组件 -->
    <div class="video-background">
        <!-- ❗请确保你的视频路径和名字正确，如果是根目录下的 videos 文件夹，用下面的路径 -->
        <video autoplay loop muted playsinline>
            <source src="videos/bg.mp4" type="video/mp4">
        </video>
    </div>
    
    <!-- 暗色滤镜遮罩 -->
    <div class="video-overlay"></div>

    <!-- 网页核心内容 -->
    <div class="main-container">
        <div class="glass-card">
            <!-- 头像（如果没有，可以先删掉这一行） -->
            <!-- <img src="avatar.jpg" alt="Avatar" class="avatar"> -->
            
            <h1>GAO DONGSHENG</h1>
            <div class="subtitle">保持热爱，奔赴山海</div>
            
            <!-- 个人链接导航 -->
            <div class="links-group">
                <a href="#" class="btn">作品集 Portfolio</a>
                <a href="#" class="btn">关于我 About Me</a>
                <a href="mailto:your-email@example.com" class="btn">联系我 Contact</a>
            </div>
        </div>
    </div>

</body>
</html>
