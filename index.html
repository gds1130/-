<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>欢迎来到高东升的世界</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

html,body{
  <div class="video-background" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;">
    <video autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
        <source src="videos/bg.mp4" type="video/mp4">
    </video>
</div>

width:100%;
height:100%;
overflow:hidden;
}

body{
background:
linear-gradient(
180deg,
#021024 0%,
#03244a 30%,
#053d73 60%,
#03244a 100%
);
position:relative;
}

#particles-js{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:1;
}

.ocean-glow{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
rgba(0,180,255,.15),
transparent 60%);
z-index:2;
pointer-events:none;
}

.bottom-enter{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

.enter-btn{

display:inline-block;

padding:18px 45px;

font-size:24px;

font-weight:bold;

letter-spacing:3px;

color:#fff;

text-decoration:none;

border:2px solid rgba(255,255,255,.4);

border-radius:60px;

backdrop-filter:blur(10px);

background:rgba(255,255,255,.08);

transition:.4s;

box-shadow:
0 0 20px rgba(0,180,255,.4),
0 0 40px rgba(0,180,255,.2);

}

.enter-btn:hover{

transform:translateY(-5px);

box-shadow:
0 0 30px rgba(0,180,255,.8),
0 0 60px rgba(0,180,255,.5);

}

.center-title{

position:absolute;

top:40%;

left:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:10;

color:white;

}

.center-title h1{

font-size:4rem;

font-weight:800;

letter-spacing:5px;

text-shadow:
0 0 20px rgba(255,255,255,.6);

}

.center-title p{

margin-top:20px;

font-size:1.2rem;

opacity:.85;

}

@media(max-width:768px){

.center-title h1{
font-size:2.2rem;
}

.center-title p{
font-size:1rem;
}

.enter-btn{
font-size:18px;
padding:15px 35px;
}

}

</style>
</head>

<body>

<div id="particles-js"></div>

<div class="ocean-glow"></div>

<div class="center-title">
<h1>欢迎来到高东升的世界</h1>
<p>探索未来 · 发现无限可能</p>
</div>

<div class="bottom-enter">
<a href="tools.html" class="enter-btn">
进入AI世界
</a>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js", {

particles: {

number: {
value: 140,
density: {
enable: true,
value_area: 1000
}
},

color: {
value: "#4fc3ff"
},

shape: {
type: "circle"
},

opacity: {
value: 0.7,
random: true
},

size: {
value: 4,
random: true
},

line_linked: {
enable: true,
distance: 160,
color: "#4fc3ff",
opacity: 0.35,
width: 1
},

move: {
enable: true,
speed: 1.8,
direction: "none",
random: false,
straight: false,
out_mode: "out",
bounce: false
}

},

interactivity: {

detect_on: "canvas",

events: {

onhover: {
enable: true,
mode: "grab"
},

onclick: {
enable: true,
mode: "push"
},

resize: true

},

modes: {

grab: {
distance: 220,
line_linked: {
opacity: 1
}
},

push: {
particles_nb: 8
}

}

},

retina_detect: true

});

</script>

</body>
</html>
