<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>高东升 | AI Developer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#050505;
color:#fff;
overflow-x:hidden;
}

/* 首屏 */

.hero{
position:relative;
height:100vh;

background-image:url("./hero.jpg");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.75)
);
}

.hero-content{
position:relative;
z-index:10;
text-align:center;
padding:20px;
}

.small-title{
font-size:14px;
letter-spacing:6px;
color:#d1d5db;
margin-bottom:20px;
}

.hero h1{
font-size:90px;
font-weight:300;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#d1d5db;
margin-bottom:40px;
}

.scroll-btn{
display:inline-block;
padding:12px 28px;

border:1px solid rgba(255,255,255,.3);

border-radius:999px;

text-decoration:none;

color:#fff;

transition:.3s;
}

.scroll-btn:hover{
background:white;
color:black;
}

/* 导航 */

nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);

width:90%;
max-width:1200px;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 28px;

border-radius:20px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

z-index:999;
}

.logo{
font-weight:700;
font-size:18px;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:white;
}

/* 内容 */

.section{
padding:120px 30px;
max-width:1100px;
margin:auto;
}

.section h2{
font-size:42px;
margin-bottom:40px;
}

.section p{
line-height:2;
color:#d1d5db;
}

/* 项目 */

.card-grid{
display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:30px;
}

.card{
padding:35px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

border-radius:24px;

transition:.4s;
}

.card:hover{
transform:translateY(-10px);

box-shadow:
0 20px 40px rgba(255,255,255,.08);
}

.card h3{
margin-bottom:15px;
}

.card p{
color:#9ca3af;
}

/* 时间轴 */

.timeline{
border-left:2px solid rgba(255,255,255,.1);
padding-left:30px;
}

.timeline-item{
margin-bottom:50px;
}

.timeline-item h3{
margin-bottom:10px;
}

/* 联系 */

.contact{
text-align:center;
}

.contact a{
display:inline-block;
margin:10px;
color:white;
text-decoration:none;
}

/* 页脚 */

footer{
padding:50px;
text-align:center;
color:#666;
}

@media(max-width:768px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

.section h2{
font-size:30px;
}

.menu{
display:none;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
GAO
</div>

<div class="menu">
<a href="#about">关于</a>
<a href="#projects">项目</a>
<a href="#timeline">历程</a>
<a href="#contact">联系</a>
</div>

</nav>

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">

<div class="small-title">
AI DEVELOPER · CREATOR
</div>

<h1>高东升</h1>

<p>
持续学习 · 持续创造
</p>

<a href="#about" class="scroll-btn">
向下探索 ↓
</a>

</div>

</section>

<section id="timeline" class="section">

<div class="timeline">

<div class="timeline-item">

<p>开始接触人工智能</p>
</div>

</div>

</section>

<section id="contact" class="section contact">

</section>

<footer>

© 2026 Gao Dongsheng

</footer>

</body>
</html>
