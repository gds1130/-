<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>高东升 | GAO DONGSHENG</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* 首屏 */

.hero{

height:100vh;

background:
linear-gradient(
rgba(0,0,0,.35),
rgba(0,0,0,.75)
),
url("hero.jpg/hero.jpg");

background-size:cover;
background-position:75% center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;

position:relative;
}

/* 中央内容 */

.hero-content{

text-align:center;

padding:40px;

backdrop-filter:blur(2px);

animation:fadeIn 2s ease;
}

.hero-en{

font-size:13px;

letter-spacing:10px;

color:rgba(255,255,255,.6);

margin-bottom:20px;
}

.hero-name{

font-size:64px;

font-weight:300;

letter-spacing:10px;

margin-bottom:18px;
}

.hero-tag{

font-size:14px;

letter-spacing:4px;

color:rgba(255,255,255,.75);
}

/* Scroll */

.scroll-tip{

position:absolute;

bottom:40px;

left:50%;

transform:translateX(-50%);

font-size:12px;

letter-spacing:5px;

color:rgba(255,255,255,.55);

animation:float 2.5s infinite ease-in-out;
}

/* 第二屏 */

.about{

background:#050505;

padding:120px 30px;

text-align:center;
}

.about h2{

font-size:36px;

font-weight:300;

margin-bottom:40px;
}

.about p{

max-width:700px;

margin:auto;

line-height:2;

font-size:18px;

color:#d1d5db;
}

/* 联系方式 */

.contact{

padding:120px 30px;

text-align:center;
}

.contact h2{

font-size:36px;

font-weight:300;

margin-bottom:40px;
}

.contact-item{

margin:20px 0;

font-size:18px;
}

.contact-label{

display:block;

color:#888;

margin-bottom:10px;
}

/* 页脚 */

footer{

padding:60px 20px;

text-align:center;

color:#666;

border-top:1px solid rgba(255,255,255,.05);
}

/* 动画 */

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);
}

to{

opacity:1;

transform:translateY(0);
}

}

@keyframes float{

0%{

transform:translateX(-50%) translateY(0);
}

50%{

transform:translateX(-50%) translateY(10px);
}

100%{

transform:translateX(-50%) translateY(0);
}

}

/* 手机 */

@media(max-width:768px){

.hero{

background-position:70% center;
}

.hero-name{

font-size:42px;

letter-spacing:4px;
}

.hero-en{

font-size:11px;

letter-spacing:4px;
}

.hero-tag{

font-size:12px;

line-height:2;
}

.about h2,
.contact h2{

font-size:28px;
}

.about p{

font-size:16px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="hero-content">

<div class="hero-en">
GAO DONGSHENG
</div>

<div class="hero-name">
高东升
</div>

<div class="hero-tag">
退伍军人 · AI使用者 · 旅行者
</div>

</div>

<div class="scroll-tip">
SCROLL ↓
</div>

</section>

<section class="about">

<h2>关于我</h2>

<p>

你好，我是高东升。

曾经是一名军人。

如今热爱旅行、人工智能与创造。

我喜欢不断学习新的事物，
也喜欢在路上观察世界。

我相信：

行动比等待更重要。

经历比答案更珍贵。

保持热爱，
奔赴山海。

</p>

</section>

</div>

</div>

</section>

<footer>

© 2026 GAO DONGSHENG

</footer>

</body>

</html>
