<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>属于你的 AI 导航站</title>

<style>
 .enter-btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:50px;
font-size:18px;
transition:.3s;
}

.enter-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(59,130,246,.7);
} 
#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:#0b1020;
}

header,
.container,
footer{
position:relative;
z-index:1;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

body{
background:#0b1020;
color:white;
}

header{
padding:80px 20px;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

header h1{
font-size:3rem;
margin-bottom:15px;
}

header p{
font-size:1.2rem;
color:#dbeafe;
}

.search-box{
margin-top:30px;
}

.search-box input{
width:90%;
max-width:600px;
padding:15px;
border:none;
border-radius:50px;
font-size:16px;
outline:none;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.section-title{
font-size:28px;
margin-bottom:25px;
border-left:5px solid #3b82f6;
padding-left:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:50px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
transition:0.3s;
border:1px solid #1f2937;
}

.card:hover{
transform:translateY(-8px);
border-color:#3b82f6;
box-shadow:0 0 20px rgba(59,130,246,.4);
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#9ca3af;
margin-bottom:15px;
}

.card a{
display:inline-block;
padding:10px 18px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
}

.card a:hover{
background:#1d4ed8;
}

footer{
text-align:center;
padding:40px;
background:#111827;
margin-top:50px;
}

footer p{
color:#9ca3af;
margin:8px 0;
}

</style>
</head>
